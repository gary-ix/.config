# Reload
unbind r
bind r source-file $HOME/.tmux.conf

# Rebind leader
# set -g prefix C-Space
set -g prefix `

# Enable mouse support
set -g mouse on
set -g set-clipboard on
set -g assume-paste-time 200

# Enable copy on selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Cursor/VS Code emits dense wheel events. Reduce tmux copy-mode step size.
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Vi keys in copy mode.
set-window-option -g mode-keys vi
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane

# Use tmux terminfo inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm*:RGB"

# Move status to the top
set-option -g status-position top

# Dont show pane border status
set-window-option -g pane-border-status off

# Start windows and panes from 1
set -g base-index 1
set -g pane-base-index 1

# Pane selection
bind-key j select-pane -L
bind-key k select-pane -D
bind-key l select-pane -U
bind-key ';' select-pane -R

# Pane creation
unbind '"'
unbind %
bind - split-window -v
bind '=' split-window -h

# Ring terminal bell for non-zero exits (ignore exit 0)
set-hook -g pane-died "if -F '#{&&:#{!=:#{pane_dead_status},0},#{!=:#{pane_dead_status},130}}' \"run-shell 'printf \\a'\""

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Plugin - gruvbox
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-x ""
set -g @tmux-gruvbox-right-status-y '%m-%d'
set -g @tmux-gruvbox-right-status-z '#h #{tmux_mode_indicator}'

# Run tpm (plugin manager)
run '~/.tmux/plugins/tpm/tpm'
